<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemiverse - 3D Periodic Table</title>
    <!-- Tambahkan versi ?v=4 agar browser melakukan reload CSS (Cache Busting) -->
    <link rel="stylesheet" href="css/style.css?v=4">
    <!-- Google Fonts for elegant look -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 3D Background Canvas -->
    <div id="canvas-container"></div>

    <!-- Scrollable Content Overlay -->
    <div id="content">
        <section id="hero-section">
            <h1 id="hero-title"></h1>
            <h2 id="hero-subtitle"></h2>
            <p id="hero-narration"></p>
        </section>
        <section id="table-section">
            <!-- Ruang kosong untuk menscroll ke bawah menuju tabel -->
        </section>
    </div>

    <!-- UI Panel for Element details -->
    <div id="info-panel">
        <h2 id="element-name">Name</h2>
        <div class="symbol" id="element-symbol">Sym</div>
        <p><strong>Atomic Number:</strong> <span id="element-number"></span></p>
        <p><strong>Mass:</strong> <span id="element-mass"></span></p>
        <p><strong>Category:</strong> <span id="element-category"></span></p>
    </div>

    <!-- Three.js libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Tween.js for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.0002); // Dikurangi agar kabut tidak terlalu tebal

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 30000);
        // Start camera slightly higher, we will animate it down on scroll
        camera.position.z = 4500; // Diperdekat agar tabel terlihat sangat besar (3/4 layar landscape)
        camera.position.y = 2000; // Posisi awal di atas Hero section

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // OrbitControls is removed so the table stays in a fixed position.

        // 1.5 Subtle Background Particles (Shooting stars/dust)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i * 3] = (Math.random() - 0.5) * 15000;
            posArray[i * 3 + 1] = Math.random() * 15000 - 5000;
            posArray[i * 3 + 2] = (Math.random() - 0.5) * 10000 - 2000;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 8,
            color: 0xaaaaaa,
            transparent: true,
            opacity: 0.3
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // 1.6 Hero 3D Hydrogen Block (Polished Silver)
        const heroGroup = new THREE.Group();
        
        // Buat tekstur khusus untuk balok Hidrogen
        const canvasH = document.createElement('canvas');
        canvasH.width = 1024;
        canvasH.height = 1432;
        const contextH = canvasH.getContext('2d');
        contextH.fillStyle = '#ffffff';
        contextH.font = 'bold 160px "Montserrat", sans-serif';
        contextH.textAlign = 'left';
        contextH.fillText('1', 60, 180);
        contextH.font = 'bold 500px "Cormorant Garamond", serif';
        contextH.textAlign = 'center';
        contextH.fillText('H', canvasH.width / 2, 750);
        contextH.font = '130px "Montserrat", sans-serif';
        contextH.fillText('Hydrogen', canvasH.width / 2, 950);
        contextH.font = '110px "Montserrat", sans-serif';
        contextH.fillText('1.008', canvasH.width / 2, 1150);
        const textureH = new THREE.CanvasTexture(canvasH);

        const heroMaterialFront = new THREE.MeshStandardMaterial({
            color: 0xdddddd, // Polished silver base
            roughness: 0.1, // Sangat mengkilap
            metalness: 1.0,
            map: textureH
        });
        const heroMaterialSide = new THREE.MeshStandardMaterial({
            color: 0xdddddd,
            roughness: 0.1,
            metalness: 1.0
        });
        
        const heroBox = new THREE.Mesh(new THREE.BoxGeometry(600, 840, 120), [
            heroMaterialSide, heroMaterialSide, heroMaterialSide, heroMaterialSide, heroMaterialFront, heroMaterialSide
        ]);
        heroGroup.add(heroBox);
        
        // Position hydrogen block to the right, at Y=2000 to match initial camera view
        heroGroup.position.set(2200, 2000, 0); 
        // Agak miring agar terlihat berdimensi
        heroGroup.rotation.set(0.2, -0.4, 0.1);
        scene.add(heroGroup);

        // 2. Elegant Gallery Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); 
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(-2000, 1500, 2000); 
        scene.add(directionalLight);

        // Tambahkan lampu di sekitar balok untuk menciptakan pantulan (reflection) pada metal
        const pointLight1 = new THREE.PointLight(0xffffff, 0.8, 5000);
        pointLight1.position.set(3000, 3000, 2000);
        scene.add(pointLight1);
        const pointLight2 = new THREE.PointLight(0xabcdef, 0.5, 5000); // Cool tone reflection
        pointLight2.position.set(1000, 1000, 3000);
        scene.add(pointLight2);

        // Raycaster for interactivity
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let elementsData = [];
        const objects = [];

        // 3. Data Fetching from PHP
        // PHP-first approach: PHP handles the DB, JS just renders
        async function fetchElements() {
            try {
                // Fetch from our PHP backend
                const response = await fetch('api/elements.php');
                const result = await response.json();
                
                if (result.status === 'success') {
                    elementsData = result.data;
                    build3DTable();
                } else {
                    console.error('Error fetching data:', result.message);
                }
            } catch (error) {
                console.error('Network or parsing error:', error);
                // We don't alert here to avoid stopping the experience if it's just slow
                console.warn("Failed to fetch data from API. Please ensure MySQL is running and the database is imported.");
            }
        }

        // Helper to create text texture
        function createLabelTexture(el) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1432; 
            const context = canvas.getContext('2d');

            context.fillStyle = 'rgba(0, 0, 0, 0)';
            context.fillRect(0, 0, canvas.width, canvas.height);

            context.fillStyle = '#ffffff';
            context.font = 'bold 160px Inter, sans-serif';
            context.textAlign = 'left';
            context.fillText(el.atomic_number, 60, 180);

            context.font = 'bold 450px Inter, sans-serif';
            context.textAlign = 'center';
            // Tambahkan batas lebar max 900px agar huruf panjang tidak melebihi kotak
            context.fillText(el.symbol, canvas.width / 2, 680, 900);

            context.font = '130px Inter, sans-serif';
            context.fillText(el.name, canvas.width / 2, 950, 900);

            context.font = '110px Inter, sans-serif';
            context.fillText(parseFloat(el.atomic_mass).toFixed(3), canvas.width / 2, 1150, 900);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        // 4. Build 3D Objects
        const periodicTableGroup = new THREE.Group();
        periodicTableGroup.position.y = -5000; // Sembunyikan jauh di bawah pada awalnya
        scene.add(periodicTableGroup);

        let introComplete = false;
        setTimeout(() => introComplete = true, 3500);

        function build3DTable() {
            // Standard periodic table spacing
            const spacingX = 240;
            const spacingY = 320;
            const offsetX = - (18 * spacingX) / 2;
            const offsetY = (10 * spacingY) / 2;

            elementsData.forEach((el, i) => {
                // Determine layout position based on xpos/ypos from database
                const targetX = el.xpos * spacingX + offsetX;
                const targetY = - (el.ypos * spacingY) + offsetY;
                const targetZ = 0;

                // Create a minimalist block
                const geometry = new THREE.BoxGeometry(200, 280, 40);
                
                // Elegant CPK material setup
                const texture = createLabelTexture(el);
                const baseColor = new THREE.Color(el.color_hex || '#aaaaaa');
                const silverTone = new THREE.Color(0x888888);
                // Blend color with silver to make it subtle and elegant
                const elegantColor = baseColor.clone().lerp(silverTone, 0.5);
                
                const frontMaterial = new THREE.MeshStandardMaterial({
                    color: elegantColor,
                    metalness: 0.5,
                    roughness: 0.3, // Terlihat seperti mineral/kaca yang mewah
                    transparent: true,
                    opacity: 0.9,
                    map: texture
                });
                
                const sideMaterial = new THREE.MeshStandardMaterial({
                    color: elegantColor,
                    metalness: 0.5,
                    roughness: 0.3,
                    transparent: true,
                    opacity: 0.7
                });
                
                const materials = [
                    sideMaterial, // right
                    sideMaterial, // left
                    sideMaterial, // top
                    sideMaterial, // bottom
                    frontMaterial, // front
                    sideMaterial  // back
                ];

                const mesh = new THREE.Mesh(geometry, materials);
                
                // Set initial position for scatter intro
                mesh.position.set(
                    Math.random() * 4000 - 2000,
                    Math.random() * 4000 - 2000,
                    Math.random() * 4000 - 2000
                );
                
                // Store data in userData for raycasting later
                el.targetZ = 0;
                el.targetRotX = 0;
                el.targetRotY = 0;
                mesh.userData = el;
                
                periodicTableGroup.add(mesh);
                objects.push(mesh);

                // Animate to target position
                new TWEEN.Tween(mesh.position)
                    .to({ x: targetX, y: targetY, z: targetZ }, Math.random() * 2000 + 1000)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();
            });
        }

        // 5. Interactivity (Hover/Click)
        function onPointerMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('pointermove', onPointerMove);

        // 5.5 Scroll Interaction
        let scrollY = 0;
        const heroSection = document.getElementById('hero-section');
        
        window.addEventListener('scroll', () => {
            scrollY = window.scrollY;
            const maxScroll = window.innerHeight;
            
            // Fade out hero text
            let opacity = 1 - (scrollY / (maxScroll * 0.5));
            if (opacity < 0) opacity = 0;
            heroSection.style.opacity = opacity;
        });

        // Typewriter Effect Logic
        const titleEl = document.getElementById('hero-title');
        const subtitleEl = document.getElementById('hero-subtitle');
        const narrationEl = document.getElementById('hero-narration');
        
        const titleText = "CHEMIVERSE";
        const subtitleText = "Mapping the Architecture of Reality.";
        const narrationText = "Dive into the fundamental elements that construct our universe. Experience a seamless transition from abstract data to tangible periodic structure, meticulously crafted for scientists and visionaries.";
        
        async function typeWriter(el, text, speed = 50) {
            el.innerHTML = '<span class="cursor"></span>';
            for (let i = 0; i < text.length; i++) {
                el.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>';
                await new Promise(r => setTimeout(r, speed + Math.random() * 20)); // Cepat dan natural
            }
        }

        async function startIntro() {
            await typeWriter(titleEl, titleText, 120);
            titleEl.innerHTML = titleText; // Hilangkan kursor dari judul
            await typeWriter(subtitleEl, subtitleText, 40);
            subtitleEl.innerHTML = subtitleText;
            await typeWriter(narrationEl, narrationText, 20);
        }
        startIntro();

        // 6. Render Loop
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();

            // Animate particles falling slowly
            const positions = particlesGeometry.attributes.position.array;
            for(let i = 1; i < particlesCount * 3; i += 3) {
                positions[i] -= 2; // fall down
                if(positions[i] < -5000) {
                    positions[i] = 10000;
                }
            }
            particlesGeometry.attributes.position.needsUpdate = true;

            // Rotate Hydrogen block slowly (side-rotation)
            heroGroup.rotation.y += 0.003;

            // Scroll animations
            const maxScroll = window.innerHeight;
            let scrollProgress = Math.min(scrollY / maxScroll, 1.0);
            
            // Move camera y from 2000 down to 0
            const targetCameraY = 2000 - (scrollProgress * 2000);
            camera.position.y += (targetCameraY - camera.position.y) * 0.1;

            // Fade out hero block based on scroll
            heroGroup.position.y = 2000 + (scrollProgress * 1000); // Move up and away
            
            // Slide periodic table up smoothly
            let tableScrollProgress = Math.max(0, (scrollY - maxScroll * 0.4) / (maxScroll * 0.6));
            if (tableScrollProgress > 1) tableScrollProgress = 1;
            
            // Tabel mulai dari -3000 (di bawah layar) naik ke 0
            const targetTableY = -3000 + (tableScrollProgress * 3000);
            periodicTableGroup.position.y += (targetTableY - periodicTableGroup.position.y) * 0.1;

            // Raycasting for hover effects
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            // Reset hover targets
            objects.forEach(obj => {
                obj.material.forEach(mat => mat.emissive.setHex(0x000000)); // Reset glow
                obj.userData.targetZ = 0;
                obj.userData.targetRotX = 0;
                obj.userData.targetRotY = 0;
            });

            if (intersects.length > 0) {
                const object = intersects[0].object;
                object.material.forEach(mat => mat.emissive.setHex(0x333333)); // Subtle white glow on hover
                
                // Hover 3D effect: maju dan sedikit berputar
                object.userData.targetZ = 150;
                object.userData.targetRotX = 0.2; // putar sedikit ke atas
                object.userData.targetRotY = 0.3; // putar sedikit ke samping

                // Update UI Panel
                const data = object.userData;
                document.getElementById('info-panel').style.display = 'block';
                document.getElementById('element-name').textContent = data.name;
                document.getElementById('element-symbol').textContent = data.symbol;
                document.getElementById('element-number').textContent = data.atomic_number;
                document.getElementById('element-mass').textContent = parseFloat(data.atomic_mass).toFixed(3);
                document.getElementById('element-category').textContent = data.category;
                
                document.getElementById('element-symbol').style.color = '#ffffff';
            } else {
                document.getElementById('info-panel').style.display = 'none';
            }

            // Smooth interpolation for 3D hover effects
            if (introComplete) {
                objects.forEach(obj => {
                    obj.position.z += (obj.userData.targetZ - obj.position.z) * 0.15;
                    obj.rotation.x += (obj.userData.targetRotX - obj.rotation.x) * 0.15;
                    obj.rotation.y += (obj.userData.targetRotY - obj.rotation.y) * 0.15;
                });
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Init
        animate();
        fetchElements();
    </script>
</body>
</html>
